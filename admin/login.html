<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Crowngate Financial Group</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/style.css">
    <style>
        body {
            background: linear-gradient(135deg, var(--canada-red) 0%, #a01730 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            background: var(--canada-white);
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            padding: 3rem 2rem;
            max-width: 400px;
            width: 100%;
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-header h2 {
            color: var(--canada-red);
            font-weight: 700;
            margin: 1rem 0;
        }

        .login-header p {
            color: #7f8c8d;
            font-size: 0.9rem;
        }

        .form-control {
            border: 1px solid #bdc3c7;
            padding: 0.75rem;
            margin-bottom: 1rem;
        }

        .form-control:focus {
            border-color: var(--canada-red);
            box-shadow: 0 0 0 0.2rem rgba(196, 30, 58, 0.25);
        }

        .btn-login {
            background: linear-gradient(135deg, var(--canada-red) 0%, #a01730 100%);
            color: var(--canada-white);
            border: none;
            padding: 0.75rem;
            font-weight: 600;
            margin-top: 1rem;
        }

        .btn-login:hover {
            background: linear-gradient(135deg, #a01730 0%, var(--canada-red) 100%);
            color: var(--canada-white);
        }

        .forgot-password {
            text-align: center;
            margin-top: 1rem;
        }

        .forgot-password a {
            color: var(--canada-red);
            text-decoration: none;
            font-size: 0.9rem;
        }

        .forgot-password a:hover {
            text-decoration: underline;
        }

        .alert {
            margin-bottom: 1.5rem;
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="login-header">
        <h2><i class="fas fa-crown"></i> CROWNGATE ADMIN</h2>
        <p>Professional Financial Consultancy</p>
    </div>

    <div id="errorAlert" class="alert alert-danger" style="display: none;"></div>

    <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="mb-3">
            <label for="username" class="form-label"><strong>Username or Email</strong></label>
            <input type="text" class="form-control" id="username" placeholder="Enter your username" required>
        </div>

        <div class="mb-3">
            <label for="password" class="form-label"><strong>Password</strong></label>
            <input type="password" class="form-control" id="password" placeholder="Enter your password" required>
        </div>

        <div class="form-check mb-3">
            <input type="checkbox" class="form-check-input" id="rememberMe">
            <label class="form-check-label" for="rememberMe">Remember me</label>
        </div>

        <button type="submit" class="btn btn-login w-100">
            <i class="fas fa-sign-in-alt me-2"></i> Login
        </button>
    </form>

    <div class="forgot-password">
        <a href="#">Forgot Password?</a>
    </div>
</div>

<script>
function handleLogin(event) {
    event.preventDefault();
    
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    const errorAlert = document.getElementById('errorAlert');
    
    // Demo login - in production this would verify against a backend
    if ((username === 'admin' || username === 'admin@crowngatefinancialgroup.com') && password === 'chisom123') {
        // Store admin session
        sessionStorage.setItem('adminLoggedIn', 'true');
        sessionStorage.setItem('adminUser', username);
        
        if (document.getElementById('rememberMe').checked) {
            localStorage.setItem('adminUsername', username);
        }
        
        // Redirect to dashboard
        window.location.href = 'index.html';
    } else {
        errorAlert.style.display = 'block';
        errorAlert.innerHTML = '<i class="fas fa-exclamation-circle"></i> Invalid username or password!';
    }
}

// Check if already logged in
window.addEventListener('load', function() {
    if (sessionStorage.getItem('adminLoggedIn')) {
        window.location.href = 'index.html';
    }
    
    // Pre-fill username if remembered
    const savedUsername = localStorage.getItem('adminUsername');
    if (savedUsername) {
        document.getElementById('username').value = savedUsername;
        document.getElementById('rememberMe').checked = true;
    }
});
</script>

</body>
</html>
